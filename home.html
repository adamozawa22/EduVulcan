<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik Elektroniczny - Dashboard</title>
    <style>
        :root {
            --primary: #6200EE;
            --bg: #F5F5F5;
            --sidebar-bg: #FFFFFF;
            --text-main: #333;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; background: var(--bg); color: var(--text-main); min-height: 100vh; }

        /* Sidebar */
        nav { width: 250px; background: var(--sidebar-bg); padding: 20px; border-right: 1px solid #ddd; }
        nav h2 { margin-bottom: 30px; color: var(--primary); }
        nav ul { list-style: none; }
        nav li { padding: 15px; cursor: pointer; border-radius: var(--radius); margin-bottom: 5px; transition: 0.3s; }
        nav li:hover { background: #EFEFEF; }
        nav li.active { background: var(--primary); color: white; }

        /* Main Content */
        main { flex: 1; padding: 30px; }
        .view { display: none; }
        .view.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; display: flex; overflow-x: auto; white-space: nowrap; }
            nav ul { display: flex; width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <h2>E-Dziennik</h2>
        <ul>
            <li class="active" onclick="showView('dashboard')">Dashboard</li>
            <li onclick="showView('oceny')">Oceny</li>
            <li onclick="showView('plan')">Plan lekcji</li>
        </ul>
    </nav>

    <main id="content">
        <div id="dashboard" class="view active">
            <h1>Dashboard</h1>
            <div class="grid">
                <div class="card"><h3>Aktualna lekcja</h3><p>Matematyka | Sala 204 | 10:45</p></div>
                <div class="card"><h3>Ostatnie oceny</h3><ul><li>J. Polski: 5</li><li>Fizyka: 4</li></ul></div>
                <div class="card"><h3>Najbliższe zadania</h3><p>Referat z biologii (do 15.04)</p></div>
            </div>
        </div>
        <div id="oceny" class="view"><h1>Oceny</h1><p>Lista ocen ucznia...</p></div>
        <div id="plan" class="view"><h1>Plan lekcji</h1><p>Szczegółowy plan...</p></div>
    </main>

    <script>
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
