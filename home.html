<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVulcan - Panel Ucznia</title>
    <style>
        /* CSS - Projekt responsywny */
        body { font-family: sans-serif; margin: 0; background-color: #f4f6f8; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .content-area { margin-top: 20px; padding: 20px; background: white; border-radius: 8px; display: none; }
        @media (max-width: 600px) { nav { flex-direction: column; } }
    </style>
</head>
<body>

<nav>
    <h2>EduVulcan</h2>
    <div id="nav-links">Witaj, Uczniu!</div>
</nav>

<div class="container">
    <div class="grid">
        <div class="card" onclick="showContent('wiadomosci')">✉️ Wiadomości</div>
        <div class="card" onclick="showContent('oceny')">📊 Oceny</div>
        <div class="card" onclick="showContent('frekwencja')">🕒 Frekwencja</div>
        <div class="card" onclick="showContent('plan')">📅 Plan Lekcji</div>
    </div>

    <div id="display-area" class="content-area">
        <h3 id="content-title">Wybierz sekcję</h3>
        <p id="content-text">Kliknij w wybrany kafelek, aby zobaczyć szczegóły.</p>
    </div>
</div>

<script>
    // JS - Logika przełączania zakładek
    function showContent(section) {
        const area = document.getElementById('display-area');
        const title = document.getElementById('content-title');
        const text = document.getElementById('content-text');
        
        area.style.display = 'block';
        
        const data = {
            'wiadomosci': {t: 'Wiadomości', d: 'Brak nowych wiadomości w skrzynce.'},
            'oceny': {t: 'Oceny', d: 'Twoja średnia: 4.8. Ostatnia ocena: Matematyka - 5.'},
            'frekwencja': {t: 'Frekwencja', d: 'Obecność: 95%. Brak nieusprawiedliwionych godzin.'},
            'plan': {t: 'Plan Lekcji', d: 'Dziś: 1. Matematyka, 2. Język Polski, 3. Historia.'}
        };

        title.innerText = data[section].t;
        text.innerText = data[section].d;
    }
</script>

</body>
</html>
